    /* ── Projects Showcase ─────────────────────────────── */
    .proj-section {
      background: #111;
      padding: 60px 0 80px;
    }

    /* Filter tabs */
    .proj-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .proj-filter-btn {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 8px 20px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s;
      letter-spacing: 0.02em;
    }

    .proj-filter-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.25);
    }

    .proj-filter-btn.is-active {
      background: var(--color-accent);
      color: #000;
      border-color: var(--color-accent);
    }

    /* Carousel */
    .proj-carousel {
      position: relative;
      width: 100%;
      background: #000;
      user-select: none;
    }

    .proj-carousel__wrap {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
    }

    .proj-carousel__stage {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      max-height: 52vh;
      overflow: hidden;
      cursor: zoom-in;
    }

    .proj-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.75s ease;
    }

    .proj-slide.is-active {
      opacity: 1;
    }

    .proj-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Gradient overlay at bottom for meta text */
    .proj-carousel__stage::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Arrows */
    .proj-carousel__arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .proj-carousel__arrow:hover {
      background: rgba(0,0,0,0.75);
      border-color: var(--color-accent);
      transform: translateY(-50%) scale(1.08);
    }

    .proj-carousel__arrow--prev { left: 16px; }
    .proj-carousel__arrow--next { right: 16px; }

    .proj-carousel__arrow svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* Meta bar (counter + category label) */
    .proj-carousel__meta {
      position: absolute;
      bottom: 16px;
      left: 0;
      right: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none;
    }

    .proj-carousel__cat {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-accent);
      background: rgba(0,0,0,0.5);
      padding: 4px 10px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    .proj-carousel__counter {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      font-variant-numeric: tabular-nums;
    }

    /* Dots */
    .proj-carousel__dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px 0 4px;
      background: #111;
    }

    .proj-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      border: none;
      padding: 0;
      flex-shrink: 0;
    }

    .proj-dot.is-active {
      background: var(--color-accent);
      transform: scale(1.4);
    }

    .proj-dot:hover {
      background: rgba(255,255,255,0.6);
    }

    /* Autoplay progress bar */
    .proj-carousel__progress {
      height: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .proj-carousel__progress-bar {
      height: 100%;
      background: var(--color-accent);
      width: 0%;
      transition: none;
    }

    .proj-carousel__progress-bar.is-running {
      width: 100%;
      transition: width 3.5s linear;
    }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .proj-carousel__stage {
        aspect-ratio: 4 / 3;
        max-height: 75vw;
      }

      .proj-carousel__arrow {
        width: 40px;
        height: 40px;
      }

      .proj-carousel__arrow--prev { left: 8px; }
      .proj-carousel__arrow--next { right: 8px; }

      .proj-filter-btn {
        font-size: 0.8rem;
        padding: 7px 14px;
      }
    }

    /* Lightbox (reused from index) */
    .sc-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sc-lightbox[hidden] { display: none; }

    .sc-lightbox__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
    }

    .sc-lightbox__inner {
      position: relative;
      z-index: 1;
      max-width: 92vw;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: lbScaleIn 0.28s ease forwards;
    }

    .sc-lightbox--closing .sc-lightbox__inner {
      animation: lbScaleOut 0.26s ease forwards;
    }

    @keyframes lbScaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes lbScaleOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.92); }
    }

    .sc-lightbox__img {
      max-width: 92vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }

    .sc-lightbox__caption {
      color: rgba(255,255,255,0.6);
      font-size: 0.82rem;
      margin-top: 12px;
      text-align: center;
      max-width: 600px;
    }

    .sc-lightbox__close {
      position: absolute;
      top: -44px;
      right: 0;
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      transition: background 0.2s;
    }

    .sc-lightbox__close:hover { background: rgba(255,255,255,0.25); }
  </style>

      { src: 'assets/gallery/outdoor-living-space-02-houston-tx.webp', alt: 'Outdoor living space Houston TX 02', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-03-houston-tx.webp', alt: 'Outdoor living space Houston TX 03', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-04-houston-tx.webp', alt: 'Outdoor living space Houston TX 04', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-05-houston-tx.webp', alt: 'Outdoor living space Houston TX 05', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-06-houston-tx.webp', alt: 'Outdoor living space Houston TX 06', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-07-houston-tx.webp', alt: 'Outdoor living space Houston TX 07', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-08-houston-tx.webp', alt: 'Outdoor living space Houston TX 08', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-09-houston-tx.webp', alt: 'Outdoor living space Houston TX 09', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-10-houston-tx.webp', alt: 'Outdoor living space Houston TX 10', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-11-houston-tx.webp', alt: 'Outdoor living space Houston TX 11', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-12-houston-tx.webp', alt: 'Outdoor living space Houston TX 12', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-13-houston-tx.webp', alt: 'Outdoor living space Houston TX 13', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-14-houston-tx.webp', alt: 'Outdoor living space Houston TX 14', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-15-houston-tx.webp', alt: 'Outdoor living space Houston TX 15', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-16-houston-tx.webp', alt: 'Outdoor living space Houston TX 16', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-17-houston-tx.webp', alt: 'Outdoor living space Houston TX 17', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-18-houston-tx.webp', alt: 'Outdoor living space Houston TX 18', cat: 'living', label: 'Outdoor Living' },
      { src: 'assets/gallery/outdoor-living-space-19-houston-tx.webp', alt: 'Outdoor living space Houston TX 19', cat: 'living', label: 'Outdoor Living' },
    ];

    const AUTOPLAY_MS = 3500;

    /* ── State ───────────────────────────────────────────── */
    let activeCat    = 'all';
    let slides       = [];
    let currentIdx   = 0;
    let autoplayTimer = null;
    let isPaused     = false;
    let touchStartX  = 0;

    /* ── DOM refs ────────────────────────────────────────── */
    const stage      = document.getElementById('projStage');
    const dotsWrap   = document.getElementById('projDots');
    const counter    = document.getElementById('projCounter');
    const catLabel   = document.getElementById('projCatLabel');
    const prevBtn    = document.getElementById('projPrev');
    const nextBtn    = document.getElementById('projNext');
    const progressBar = document.getElementById('projProgressBar');
    const filterBtns = document.querySelectorAll('.proj-filter-btn');

    /* ── Lightbox ────────────────────────────────────────── */
    const lightbox   = document.getElementById('scLightbox');
    const lbImg      = document.getElementById('lbImg');
    const lbCaption  = document.getElementById('lbCaption');
    const lbClose    = document.getElementById('lbClose');
    const lbBackdrop = document.getElementById('lbBackdrop');

    function openLightbox(src, alt) {
      lbImg.src = src;
      lbImg.alt = alt;
      lbCaption.textContent = alt;
      const sw = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.paddingRight = sw + 'px';
      document.body.style.overflow = 'hidden';
      lightbox.removeAttribute('hidden');
      pauseAutoplay();
    }

    function closeLightbox() {
      lightbox.classList.add('sc-lightbox--closing');
      setTimeout(() => {
        lightbox.setAttribute('hidden', '');
        lightbox.classList.remove('sc-lightbox--closing');
        document.body.style.overflow = '';
        document.body.style.paddingRight = '';
        resumeAutoplay();
      }, 260);
    }

    lbClose.addEventListener('click', closeLightbox);
    lbBackdrop.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !lightbox.hasAttribute('hidden')) closeLightbox();
    });

    /* ── Build slides ────────────────────────────────────── */
    function buildCarousel() {
      slides = activeCat === 'all'
        ? ALL_PHOTOS.slice()
        : ALL_PHOTOS.filter(p => p.cat === activeCat);

      stage.innerHTML = '';
      slides.forEach((photo, i) => {
        const div = document.createElement('div');
        div.className = 'proj-slide' + (i === 0 ? ' is-active' : '');
        if (i === 0) div.style.transition = 'none'; // no fade-in; stage fade handles reveal
        div.setAttribute('aria-hidden', i !== 0 ? 'true' : 'false');
        const img = document.createElement('img');
        img.src    = photo.src;
        img.alt    = photo.alt;
        img.width  = 1200;
        img.height = 800;
        img.loading = i === 0 ? 'eager' : 'lazy';
        div.appendChild(img);
        stage.appendChild(div);
      });

      // Single click handler on stage using currentIdx
      stage.onclick = () => {
        const photo = slides[currentIdx];
        if (photo) openLightbox(photo.src, photo.alt);
      };

      buildDots();
      updateMeta();
    }

    /* ── Dots ────────────────────────────────────────────── */
    const MAX_DOTS = 12;

    function buildDots() {
      dotsWrap.innerHTML = '';
      if (slides.length <= 1) return;
      const count = Math.min(slides.length, MAX_DOTS);
      for (let i = 0; i < count; i++) {
        const btn = document.createElement('button');
        btn.className = 'proj-dot' + (i === 0 ? ' is-active' : '');
        btn.setAttribute('aria-label', 'Go to photo ' + (i + 1));
        btn.dataset.idx = i;
        btn.addEventListener('click', () => {
          goTo(Number(btn.dataset.idx));
          resetProgress();
        });
        dotsWrap.appendChild(btn);
      }
    }

    function updateDots() {
      const dotBtns = dotsWrap.querySelectorAll('.proj-dot');
      const dotIdx  = Math.min(currentIdx, MAX_DOTS - 1);
      dotBtns.forEach((d, i) => d.classList.toggle('is-active', i === dotIdx));
    }

    /* ── Navigate ────────────────────────────────────────── */
    function goTo(idx) {
      const slideEls = stage.querySelectorAll('.proj-slide');
      slideEls[currentIdx].classList.remove('is-active');
      slideEls[currentIdx].setAttribute('aria-hidden', 'true');
      currentIdx = (idx + slides.length) % slides.length;
      slideEls[currentIdx].classList.add('is-active');
      slideEls[currentIdx].setAttribute('aria-hidden', 'false');
      updateMeta();
      updateDots();
    }

    function next() { goTo(currentIdx + 1); }
    function prev() { goTo(currentIdx - 1); }

    /* ── Meta ────────────────────────────────────────────── */
    function updateMeta() {
      catLabel.textContent = slides[currentIdx]?.label || '';
      counter.textContent  = slides.length > 1
        ? (currentIdx + 1) + ' / ' + slides.length
        : '';
    }

    /* ── Autoplay + progress bar ─────────────────────────── */
    function resetProgress() {
      progressBar.classList.remove('is-running');
      void progressBar.offsetWidth; // reflow to restart animation
      if (!isPaused) progressBar.classList.add('is-running');
    }

    function startAutoplay() {
      stopAutoplay();
      autoplayTimer = setInterval(() => {
        if (!isPaused) { next(); resetProgress(); }
      }, AUTOPLAY_MS);
      resetProgress();
    }

    function stopAutoplay() {
      clearInterval(autoplayTimer);
      autoplayTimer = null;
    }

    function pauseAutoplay() {
      isPaused = true;
      progressBar.classList.remove('is-running');
    }

    function resumeAutoplay() {
      isPaused = false;
      resetProgress();
    }

    /* ── Arrow buttons ───────────────────────────────────── */
    prevBtn.addEventListener('click', () => { prev(); resetProgress(); });
    nextBtn.addEventListener('click', () => { next(); resetProgress(); });

    /* ── Touch / swipe ───────────────────────────────────── */
    stage.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      pauseAutoplay();
    }, { passive: true });

    stage.addEventListener('touchend', e => {
      const delta = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(delta) > 44) {
        delta > 0 ? next() : prev();
        resetProgress();
      }
      resumeAutoplay();
    }, { passive: true });

    /* ── Hover pause ─────────────────────────────────────── */
    stage.addEventListener('mouseenter', pauseAutoplay);
    stage.addEventListener('mouseleave', resumeAutoplay);

    /* ── Filter buttons ──────────────────────────────────── */
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => { b.classList.remove('is-active'); b.setAttribute('aria-selected', 'false'); });
        btn.classList.add('is-active');
        btn.setAttribute('aria-selected', 'true');
        activeCat  = btn.dataset.cat;
        currentIdx = 0;
        isPaused   = false;
        stopAutoplay();

        // Fade out → rebuild → fade in (prevents flash / erratic jump)
        stage.style.transition = 'opacity 0.15s ease';
        stage.style.opacity    = '0';
        stage.style.pointerEvents = 'none';
        setTimeout(() => {
          buildCarousel();
          stage.style.opacity = '1';
          setTimeout(() => {
            stage.style.transition    = '';
            stage.style.pointerEvents = '';
            // restore slide transitions now that stage has faded in
            stage.querySelectorAll('.proj-slide').forEach(s => { s.style.transition = ''; });
            startAutoplay();
          }, 150);
        }, 150);
      });
    });

    /* ── Keyboard navigation ─────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (lightbox.hasAttribute('hidden')) {
        if (e.key === 'ArrowRight') { next(); resetProgress(); }
        if (e.key === 'ArrowLeft')  { prev(); resetProgress(); }
      }
    });

    /* ── Init ────────────────────────────────────────────── */
    buildCarousel();
    startAutoplay();

  }());
  </script>
